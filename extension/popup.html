<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    button {
      margin-top: 8px;
      padding: 6px 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #333; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 16px;
    }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }
    #errors {
      margin-top: 12px;
      border-top: 1px solid #e5e5e5;
      padding-top: 8px;
    }
    #errors:empty { display: none; }
    #errors h3 {
      margin: 0 0 6px;
      font-size: 12px;
      color: #dc2626;
      font-weight: 600;
    }
    .error-item {
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .error-item .msg { color: #1a1a1a; }
    .error-item .time { color: #999; }
    #clear-errors {
      margin-top: 4px;
      padding: 2px 8px;
      font-size: 11px;
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      cursor: pointer;
    }
    #clear-errors:hover { color: #666; border-color: #bbb; }
  </style>
</head>
<body>
  <h2>Keeper</h2>
  <label for="serverUrl">Server URL</label>
  <input type="url" id="serverUrl" placeholder="http://localhost:3001">
  <button id="save">Save</button>
  <div id="status"></div>
  <div id="errors"></div>
  <script src="popup.js"></script>
</body>
</html>
