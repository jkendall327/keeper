<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    input,
    textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      font-family: inherit;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    button {
      margin-top: 8px;
      padding: 6px 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #333; }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .quick-note,
    .settings,
    .tab-actions {
      margin-top: 14px;
      border-top: 1px solid #e5e5e5;
      padding-top: 12px;
    }
    .quick-note {
      margin-top: 0;
      border-top: 0;
      padding-top: 0;
    }
    .quick-note button {
      width: 100%;
    }
    .tab-actions h3 {
      margin: 0 0 6px;
      font-size: 12px;
      color: #555;
      font-weight: 600;
    }
    .tab-actions button {
      display: block;
      width: 100%;
      text-align: left;
    }
    .hint {
      margin: 4px 0 0;
      font-size: 11px;
      color: #666;
      line-height: 1.35;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 16px;
    }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }
    #errors {
      margin-top: 12px;
      border-top: 1px solid #e5e5e5;
      padding-top: 8px;
    }
    #errors:empty { display: none; }
    #errors h3 {
      margin: 0 0 6px;
      font-size: 12px;
      color: #dc2626;
      font-weight: 600;
    }
    .error-item {
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .error-item .msg { color: #1a1a1a; }
    .error-item .time { color: #999; }
    #clear-errors {
      margin-top: 4px;
      padding: 2px 8px;
      font-size: 11px;
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      cursor: pointer;
    }
    #clear-errors:hover { color: #666; border-color: #bbb; }
  </style>
</head>
<body>
  <h2>Keeper</h2>
  <div class="quick-note">
    <label for="quickNote">Quick note</label>
    <textarea id="quickNote" placeholder="Type a note"></textarea>
    <button id="sendQuickNote" type="button">Send to Keeper</button>
  </div>
  <div class="settings">
    <label for="serverUrl">Server URL</label>
    <input type="url" id="serverUrl" placeholder="http://localhost:3001" aria-describedby="serverUrlHint">
    <p id="serverUrlHint" class="hint">Only http://localhost:&lt;port&gt; is supported, for example http://localhost:3001.</p>
    <button id="save">Save</button>
  </div>
  <div class="tab-actions">
    <h3>Save open tabs</h3>
    <button id="saveRightInclusive" type="button">Current tab and tabs to the right</button>
    <button id="saveRightExclusive" type="button">Tabs to the right only</button>
  </div>
  <div id="status"></div>
  <div id="errors"></div>
  <script src="popup.js"></script>
</body>
</html>
